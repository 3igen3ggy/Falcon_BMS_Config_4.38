///////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
// Configuration lines here will override settings in Falcon BMS.cfg and Falcon BMS User.cfg, when launched in VR or XR mode.
///////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

set g_fVRZoom 2.0                                    // Reduce FOV by this factor, when zoomed in.
set g_nVRHMCSEYE 0                                   // HMCS renders, 0 right eye, 1 left eye, -1 both eyes.
set g_nVRExternalRenderingMode 0                     // Rendering of outside-cockpit world - 0: mixed (default); 1: always mono; 2: always stereo
set g_fVRAltitudeFeetToRenderMono 30.0               // For 'mixed' rendering, the AGL transition altitude - below=stereo; above=mono (default: 30 ft)
set g_fVRResolution 1.0                              // VR resolution multiplier.
set g_fVRIPDMultiplier 1.0                           // VR interpupillary distance (IPD) factor.
set g_bVRParallelRenderThread 1                      // Enable multi-threaded rendering for VR (1: higher throughput; 0: lower latency).
set g_bVRPredictFutureHeadMatrices 0                 // Predict future head matrices for SteamVR. Only works with g_bVRParallelRenderThread enabled.
set g_bVRNoPresent 0                                 // This will not display the companion window in VR (only HMD will show image in 3d).
set g_bMixedRealityCockpitCoverEnabled 0             // Setting this will default the Mixed Reality Cockpit Cover on (1) or off (0). Can still be toggled in game.
set g_b3DClickableCursorFixToCenterIfVR 0            // Option to keep mouse cursor centered on display (use SimToggleCursorCenter to toggle this, in-flight)



