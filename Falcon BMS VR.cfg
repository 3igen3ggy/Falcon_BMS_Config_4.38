///////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
// Enable these lines (remove the // prefix) for to bias for performance, over appearance.
///////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

 set g_bVRNoPresent 1                      // don't draw to the companion window on the desktop
 set g_bExportRTTTextures 0                // don't render RTT textures to shared-memory

 set g_sTexturesLODPreset "Custom"            // applies to texture resolutions for terrain, cockpit, and models

set g_nTerrainPhotorealMaxTexRes 4
set g_nTerrainHiresTilesMaxTexRes 1
set g_nTerrainProceduralsMaxTexRes 1
set g_nCockpitMaxTexRes 8
set g_nModelMaxTexRes 2

 

 set g_nNewTerrainHiresTilesDistKM 0       // render distance for hires (airbase) tiles; possible values = 0 (off), 16, or 32
 set g_fNewTerrainProceduralDistance 8     // render distance for procedural texturing

 set g_bNewTerrainRenderShrubs 0           // don't draw shrubs
 set g_bNewTerrainRenderGrass 0            // don't draw grass























